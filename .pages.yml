media:
  input: public/uploads
  output: /uploads

content:
  - name: services
    label: Services
    type: collection
    path: src/content/services
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        required: true
      - name: seoTitle
        label: SEO Title
        type: string
      - name: metaDescription
        label: Meta Description
        type: text
      - name: summary
        label: Summary
        type: text
      - name: bookingType
        label: Booking Type
        type: select
        options:
          values: [direct-book, quote-request, assessment, call-only]
      - name: heroImage
        label: Hero Image URL
        type: string
      - name: heroImageAlt
        label: Hero Image Alt
        type: string
      - name: body
        label: Body
        type: rich-text

  - name: projects
    label: Projects
    type: collection
    path: src/content/projects
    format: yaml-frontmatter
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: slug
        label: Slug
        type: string
        required: true
      - name: service
        label: Service
        type: string
      - name: location
        label: Location
        type: string
      - name: summary
        label: Summary
        type: text
      - name: gallery
        label: Gallery
        type: object
        list: true
        fields:
          - name: src
            label: Cloudflare Image URL
            type: string
            required: true
          - name: alt
            label: Alt Text
            type: string
            required: true
          - name: caption
            label: Caption
            type: string
          - name: type
            label: Type
            type: select
            options:
              values: [before, after, detail, process]
          - name: featured
            label: Featured
            type: boolean
      - name: body
        label: Body
        type: rich-text
