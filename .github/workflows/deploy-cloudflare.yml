# Push → Cloudflare Pages preview ("dev")
# Actions → "Run workflow" → production (optional GitHub Environment approval)
#
# One-time setup:
# 1. Cloudflare → Workers & Pages → Create → Pages → "Upload assets" (Direct Upload)
#    Project name must match vars.CLOUDFLARE_PAGES_PROJECT (default: eys)
#    Production branch: main
# 2. Cloudflare → My Profile → API Tokens → Create Token
#    Template: "Edit Cloudflare Workers" (includes Pages) OR custom with Account.Cloudflare Pages:Edit
# 3. GitHub repo → Settings → Secrets and variables → Actions
#    Secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#    Variable (optional): CLOUDFLARE_PAGES_PROJECT=eys
# 4. GitHub → Settings → Environments → create "production"
#    (optional) enable Required reviewers so prod needs your approval
# 5. Do NOT also connect this repo via Cloudflare "Connect to Git" — that double-deploys.
#    Use Wrangler/GHA only.

name: Deploy Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deploy target'
        required: true
        type: choice
        options:
          - preview
          - production
        default: preview

concurrency:
  group: cloudflare-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Build
        env:
          # Preview builds stay out of Google; production build is indexable.
          PUBLIC_DEPLOY_ENV: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production') && 'production' || 'preview' }}
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist
          retention-days: 7

  deploy-preview:
    name: Deploy preview (dev)
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'preview')
    runs-on: ubuntu-latest
    environment:
      name: preview
      # Prefer branch alias (dev.*.pages.dev); hash URLs are always noindex
      url: ${{ steps.deploy.outputs.pages-deployment-alias-url || steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Deploy to Cloudflare Pages (dev branch)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Project name: set Actions variable CLOUDFLARE_PAGES_PROJECT, or default eys
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'eys' }} --branch=dev --commit-dirty=true

      - name: Preview URLs
        run: |
          echo "### Preview (noindex — do not use for SEO tests)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch alias: ${{ steps.deploy.outputs.pages-deployment-alias-url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy hash: ${{ steps.deploy.outputs.deployment-url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Stable project URL is only for production: https://eys-48z.pages.dev" >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    name: Deploy production
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production'
    runs-on: ubuntu-latest
    environment:
      name: production
      # Stable production hostname (not the per-deploy hash URL)
      url: https://eys-48z.pages.dev
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Deploy to Cloudflare Pages (production)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Matches Pages "Production branch" = main → live production deployment
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'eys' }} --branch=main --commit-dirty=true

      - name: Production URLs
        run: |
          echo "### Production" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SEO / Lighthouse URL:** https://eys-48z.pages.dev" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy hash (always noindex — ignore for SEO): ${{ steps.deploy.outputs.deployment-url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Alias output: ${{ steps.deploy.outputs.pages-deployment-alias-url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Custom domain (when attached): https://www.eyshandyman.com" >> "$GITHUB_STEP_SUMMARY"
